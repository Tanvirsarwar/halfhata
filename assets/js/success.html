<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order Confirmed — halfhata</title>
<link rel="icon" href="assets/img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="page">
  <div class="topbar"><div class="container">
    <a class="brand" href="index.html"><img src="assets/img/logo.jpeg" alt=""> halfhata</a>
    <div class="secure" id="secure"></div>
  </div></div>

  <div class="success-wrap">
    <div class="success-ic" id="okIc"></div>
    <h1 style="font-size:30px;letter-spacing:-.02em">Thank you for your order!</h1>
    <p style="color:var(--muted);margin-top:8px">We've received your order and will confirm it shortly on WhatsApp.</p>
    <div class="oid" id="oid">—</div>
    <p style="color:var(--muted);font-size:13px">Save this Order ID to track your delivery.</p>

    <div class="panel summary" style="text-align:left;margin-top:26px" id="orderPanel"></div>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <a class="btn btn-dark btn-lg" id="trackBtn">Track My Order</a>
      <a class="btn btn-light btn-lg" href="index.html">Continue Shopping</a>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script>
    document.getElementById('secure').innerHTML = ic('lock',15)+'<span>Your data is secure</span>';
    document.getElementById('okIc').innerHTML = ic('checkCircle',44);
    const id = new URLSearchParams(location.search).get('id');
    const o = id && Store.getOrder(id);
    if (!o) { location.replace('index.html'); }
    else {
      document.getElementById('oid').textContent = '#' + o.id;
      document.getElementById('trackBtn').href = 'track.html?id=' + o.id;
      const paidLine = o.payment.method === 'full'
        ? `<div class="sum-line"><span>Paid in full</span><span>${money(o.total)}</span></div>`
        : `<div class="sum-line"><span>Advance paid (Txn ${esc(o.payment.txnId)})</span><span>${money(o.payment.paid)}</span></div>
           <div class="sum-line"><span>Due on delivery</span><span>${money(o.payment.due)}</span></div>`;
      document.getElementById('orderPanel').innerHTML = `
        <h3>Order Summary</h3><div class="sub">${o.items.length} item(s) · placed just now</div>
        <div class="items">${o.items.map(it => `
          <div class="sum-item"><div class="im">${it.image ? `<img src="${it.image}" style="width:100%;height:100%;object-fit:cover">` : garment('tee', it.color, '80%')}</div>
          <div class="grow"><div class="nm">${esc(it.name)}</div><div class="vr">Size ${esc(it.size)}</div></div>
          <div class="pr"><b>${money(it.price*it.qty)}</b></div></div>`).join('')}</div>
        <div class="sum-line"><span>Subtotal</span><span>${money(o.subtotal)}</span></div>
        <div class="sum-line"><span>Delivery</span><span>${money(o.delivery)}</span></div>
        <div class="sum-total"><span>Total</span><span>${money(o.total)}</span></div>
        ${paidLine}
        <div class="notice" style="margin-top:14px">${ic('truck',16)} Shipping to: ${esc(o.customer.address)}, ${esc(o.customer.city)}, ${esc(o.customer.district)}</div>`;
    }
  </script>
</body>
</html>
